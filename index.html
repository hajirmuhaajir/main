<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hajir Muhaajir | Under Maintenance</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Alpine.js untuk I18N -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap');

        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-between transition-colors duration-500"
      x-data="{
        lang: 'id',
        translations: {
            id: {
                title: 'Sedang Perbaikan',
                subtitle: 'Kami sedang melakukan pembaruan besar untuk memberikan pengalaman yang lebih baik. Silakan kembali lagi nanti!',
                backSoon: 'Segera Kembali',
                footerNote: 'Dibuat dengan sepenuh hati.'
            },
            en: {
                title: 'Under Maintenance',
                subtitle: 'We are performing some scheduled updates to give you a better experience. Please check back soon!',
                backSoon: 'Back Soon',
                footerNote: 'Made with love.'
            }
        }
      }">

    <!-- Background Decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl animate-pulse-slow"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-pulse-slow"></div>
        <!-- Grid halus sebagai overlay dekoratif -->
        <div class="absolute inset-0 opacity-5 dark:opacity-10"
             style="background-image: radial-gradient(circle at 1px 1px, currentColor 1px, transparent 0); background-size: 32px 32px;"></div>
    </div>

    <!-- I18N Switcher -->
    <nav class="p-6 flex justify-end relative z-10">
        <div class="flex bg-slate-200 dark:bg-slate-800 p-1 rounded-lg shadow-sm">
            <button @click="lang = 'id'" :class="lang === 'id' ? 'bg-white dark:bg-slate-700 shadow-sm' : ''"
                    class="px-3 py-1 rounded-md text-xs font-bold transition-all">
                ID
            </button>
            <button @click="lang = 'en'" :class="lang === 'en' ? 'bg-white dark:bg-slate-700 shadow-sm' : ''"
                    class="px-3 py-1 rounded-md text-xs font-bold transition-all">
                EN
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 relative z-10">
        <div class="max-w-2xl w-full text-center">
            <!-- Icon Maintenance -->
            <div class="mb-8 inline-block group">
                <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 animate-pulse"></div>
                <i class="fas fa-tools text-6xl text-blue-500 relative drop-shadow-sm group-hover:scale-110 transition-transform"></i>
            </div>

            <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-600"
                x-text="translations[lang].title"></h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg leading-relaxed mb-10 max-w-lg mx-auto"
               x-text="translations[lang].subtitle"></p>

            <!-- Social Media Section -->
            <div class="flex flex-wrap justify-center gap-3 mb-10">
                <a href="https://www.youtube.com/@hajirstein" target="_blank" aria-label="YouTube"
                   class="w-11 h-11 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-white hover:bg-red-600 transition-all duration-300 hover:scale-110 hover:shadow-md">
                   <i class="fab fa-youtube"></i>
                </a>
                <a href="https://www.tiktok.com/@muhaajir_muhaajir" target="_blank" aria-label="TikTok"
                   class="w-11 h-11 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-white hover:bg-black transition-all duration-300 hover:scale-110 hover:shadow-md">
                   <i class="fab fa-tiktok"></i>
                </a>
                <a href="https://www.instagram.com/muhaajirere" target="_blank" aria-label="Instagram"
                   class="w-11 h-11 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-white hover:bg-pink-600 transition-all duration-300 hover:scale-110 hover:shadow-md">
                   <i class="fab fa-instagram"></i>
                </a>
                <a href="https://on.soundcloud.com/m65TNUx3XarndC67jO" target="_blank" aria-label="SoundCloud"
                   class="w-11 h-11 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-white hover:bg-orange-500 transition-all duration-300 hover:scale-110 hover:shadow-md">
                   <i class="fab fa-soundcloud"></i>
                </a>
                <a href="https://github.com/hajirmuhaajir" target="_blank" aria-label="GitHub"
                   class="w-11 h-11 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-white hover:bg-slate-900 transition-all duration-300 hover:scale-110 hover:shadow-md">
                   <i class="fab fa-github"></i>
                </a>
            </div>

            <!-- Status / Info kecil -->
            <div class="text-center">
                <span class="inline-flex items-center gap-2 font-mono text-[10px] text-slate-500 dark:text-slate-500 bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 px-4 py-1.5 rounded-full mb-6 shadow-sm select-none">
                    <i class="fas fa-lock text-blue-400"></i> HTTPS SECURED · PRIVACY FIRST
                </span>
                <p class="text-xs text-slate-400 dark:text-slate-600">
                    © 2026 Hajir Muhaajir · <span x-text="translations[lang].footerNote"></span>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer Area -->
    <footer class="w-full max-w-5xl mx-auto px-6 pb-10 relative z-10">
        <div class="mt-16 pt-8 border-t border-slate-200 dark:border-slate-800/60 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex gap-x-8 text-[11px] text-slate-400 uppercase tracking-widest font-medium">
                <span><i class="far fa-heart text-rose-400 mr-1"></i> Muhaajir</span>
                <span><i class="fas fa-mobile-alt mr-1"></i> Responsive</span>
            </div>
            <div class="text-[10px] font-mono text-slate-500 bg-slate-100 dark:bg-slate-800/30 px-3 py-1 rounded shadow-sm">
                <i class="fas fa-code text-blue-400 mr-1"></i> Clean Architecture · MIT Style
            </div>
            <div class="flex gap-4 text-slate-400">
                <i class="fab fa-html5 hover:text-orange-500 hover:scale-110 transition-transform cursor-help" title="HTML5"></i>
                <i class="fab fa-css3-alt hover:text-blue-500 hover:scale-110 transition-transform cursor-help" title="CSS3"></i>
                <i class="fab fa-js hover:text-yellow-400 hover:scale-110 transition-transform cursor-help" title="Javascript"></i>
            </div>
        </div>
    </footer>

</body>
</html>
